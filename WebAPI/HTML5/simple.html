<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>シンプル時計</title>
<script>
// 年月日の関数
function simpleDay()
{
    // 今日の日付
    var today = new Date();
    // 今年
    var year = today.getFullYear();
    // 今月
    var month = today.getMonth()+1; // +1がないと０月からとなる
    // 今日
    var day = today.getDate();
    // 今日がいつか
    document.simForm.simDay.value = year + " 年 " + month + " 月 " + day + " 日 ";
    // １秒ごとに繰り返し
    setTimeout(simpleDay,1000)
}
function simpleClock()
{
    // 日をセットします。
    var tempDay = new Date();
    // 秒をセットします。
    var Second = tempDay.getSeconds();
    // 分をセットします。
    var Minute = tempDay.getMinutes();
    // 時をセットします。
    var Time = tempDay.getHours();
    // 表示を結合します。
    document.simForm.simClock.value = Time + " 時 " + Minute + " 分 " + Second + " 秒 ";
    // １秒（１０００msec）でタイムアウトします。
    setTimeout(simpleClock,1000);
}
</script>
</head>
<body onLoad = "simpleDay(); simpleClock();">
<!-- ヘッダ -->
<header>
<h1>シンプル時計</h1>
</header>
<!-- メインコンテンツ -->
<article>
<p>
<form name="simForm">
今日の日付を表示します<br>
<input type="text" NAME="simDay"><br>
現在の時計を表示します<br>
<input type="text" NAME="simClock"><br>
</form>
</p>
</article>
<!-- フッタ -->
<footer>
(C)2012 by SCC
</footer>
</body>
</html>
